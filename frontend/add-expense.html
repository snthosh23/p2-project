<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add a new expense to track your budget limits.">
  <title>Add Expense - Smart Expense Tracker</title>
  
  <!-- FontAwesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    <main class="main-content">
      <!-- Sticky Navbar injected by app.js here -->

      <div class="dashboard-details-grid">
        <!-- Traditional Expense Form -->
        <div class="glass-card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px;">
            <h3>Record New Expense</h3>
            <!-- Voice Entry Button -->
            <button class="voice-pulse-btn" id="voice-entry-btn" title="Click to speak: e.g. Spent 15 dollars on lunch">
              <i class="fa-solid fa-microphone"></i>
            </button>
          </div>

          <form id="expense-form">
            <div class="form-group">
              <label for="title">Title / Merchant Name</label>
              <input type="text" id="title" class="form-control" placeholder="e.g. Starbucks, Walmart, landlord" required>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" class="form-control" placeholder="0.00" step="0.01" min="0.01" required>
              </div>
              <div class="form-group">
                <label for="date">Transaction Date</label>
                <input type="date" id="date" class="form-control" required>
              </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label for="category">Category</label>
                <select id="category" class="form-control" required>
                  <option value="" disabled selected>Select Category</option>
                  <option value="Food & Dining">Food & Dining</option>
                  <option value="Groceries">Groceries</option>
                  <option value="Rent/Housing">Rent/Housing</option>
                  <option value="Utilities">Utilities</option>
                  <option value="Transportation">Transportation</option>
                  <option value="Entertainment">Entertainment</option>
                  <option value="Shopping">Shopping</option>
                  <option value="Health/Medical">Health/Medical</option>
                  <option value="Education">Education</option>
                  <option value="Travel">Travel</option>
                  <option value="Miscellaneous">Miscellaneous</option>
                </select>
              </div>
              <div class="form-group">
                <label for="account">Account Source</label>
                <select id="account" class="form-control" required>
                  <!-- Dynamically populated from profile accounts list -->
                  <option value="Cash">Cash</option>
                  <option value="Bank">Bank</option>
                  <option value="Credit Card">Credit Card</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="notes">Notes (Optional)</label>
              <textarea id="notes" class="form-control" placeholder="Add receipt description or notes..." rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-danger btn-block">
              <i class="fa-solid fa-plus"></i> Record Expense
            </button>
          </form>
        </div>

        <!-- OCR Bill Scanner Panel -->
        <div class="glass-card" style="display:flex; flex-direction:column; justify-content:space-between;">
          <div>
            <h3><i class="fa-solid fa-expand" style="color:var(--primary); margin-right:8px;"></i>OCR Bill Scanner</h3>
            <p style="color:var(--text-muted); font-size:13px; margin: 10px 0 20px 0; line-height:1.5;">
              Upload or drop a digital receipt image or invoice document here. The Smart OCR engine will extract the merchant details, totals, dates, and categories instantly.
            </p>
          </div>

          <!-- Upload Container -->
          <div class="ocr-scanner-box" id="ocr-dropzone">
            <!-- Scan line overlay -->
            <div class="ocr-scan-line" id="ocr-laser"></div>
            
            <i class="fa-solid fa-receipt"></i>
            <h4 id="ocr-status-title">Drag & Drop Receipt</h4>
            <p style="font-size:12px; color:var(--text-muted); margin-top:8px;">Supports JPG, PNG, or PDF files (Max 5MB)</p>
            <input type="file" id="ocr-file-input" style="display:none;" accept="image/*,application/pdf">
          </div>

          <!-- Feedback Preview Box -->
          <div id="ocr-preview" style="display:none; font-size:13px; margin-top: 16px; border: 1px solid var(--border-color); padding: 12px; border-radius: var(--radius-sm); background-color: var(--primary-light);">
            <div style="font-weight:700; color:var(--primary); margin-bottom: 8px;">Scan Results Found!</div>
            <div id="ocr-result-text" style="color:var(--text-main);"></div>
            <button class="btn btn-secondary btn-block" style="padding: 6px; font-size:12px; margin-top: 10px;" id="ocr-apply-btn">Apply Extracted Fields</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
