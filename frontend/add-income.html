<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add a new income entry to boost your savings margin.">
  <title>Add Income - Smart Expense Tracker</title>
  
  <!-- FontAwesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    <main class="main-content">
      <!-- Sticky Navbar injected by app.js here -->

      <div class="dashboard-details-grid" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">
        <!-- Income Form -->
        <div class="glass-card">
          <div style="margin-bottom: 24px;">
            <h3>Record New Income</h3>
            <p style="color:var(--text-muted); font-size:13px; margin-top: 6px;">Log your salary, freelance earnings, interest, or dividends.</p>
          </div>

          <form id="income-form">
            <div class="form-group">
              <label for="title">Title / Source Name</label>
              <input type="text" id="title" class="form-control" placeholder="e.g. Monthly Salary, Freelance Gig, Dividend Pay" required>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" class="form-control" placeholder="0.00" step="0.01" min="0.01" required>
              </div>
              <div class="form-group">
                <label for="date">Transaction Date</label>
                <input type="date" id="date" class="form-control" required>
              </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
              <div class="form-group">
                <label for="category">Category</label>
                <select id="category" class="form-control" required>
                  <option value="" disabled selected>Select Category</option>
                  <option value="Salary">Salary</option>
                  <option value="Freelance">Freelance</option>
                  <option value="Investments">Investments</option>
                  <option value="Other Income">Other Income</option>
                </select>
              </div>
              <div class="form-group">
                <label for="account">Account Destination</label>
                <select id="account" class="form-control" required>
                  <option value="Cash">Cash</option>
                  <option value="Bank">Bank</option>
                  <option value="Credit Card">Credit Card</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="notes">Notes (Optional)</label>
              <textarea id="notes" class="form-control" placeholder="Add details or interest descriptions..." rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              <i class="fa-solid fa-plus"></i> Record Income
            </button>
          </form>
        </div>
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
