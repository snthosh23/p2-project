<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate monthly financial statements, export CSV worksheets, and download PDF reports.">
  <title>Reports Ledger - Smart Expense Tracker</title>
  
  <!-- FontAwesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    <main class="main-content">
      <!-- Sticky Navbar injected by app.js here -->

      <!-- Action & Exports Panel -->
      <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
        <div>
          <h3>Financial Statements & Reports</h3>
          <p style="color:var(--text-muted); font-size:13px; margin-top:4px;">Apply filter selections below to search transactions or compile exports.</p>
        </div>
        <div style="display:flex; gap:12px;">
          <!-- Export Buttons -->
          <button class="btn btn-secondary" id="export-csv-btn">
            <i class="fa-solid fa-file-csv" style="color:var(--primary); font-size:16px;"></i> Export to CSV
          </button>
          
          <button class="btn btn-primary" id="export-pdf-btn">
            <i class="fa-solid fa-file-pdf" style="font-size:16px;"></i> Download PDF Report
          </button>
        </div>
      </div>

      <!-- Filters Form Panel -->
      <div class="glass-card">
        <h3>Filter Transactions</h3>
        <form id="filter-form" style="margin-top:16px; display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:16px; align-items:end;">
          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-type">Type</label>
            <select id="filter-type" class="form-control">
              <option value="">All Transactions</option>
              <option value="income">Income Only</option>
              <option value="expense">Expense Only</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-category">Category</label>
            <select id="filter-category" class="form-control">
              <option value="">All Categories</option>
              <option value="Salary">Salary</option>
              <option value="Freelance">Freelance</option>
              <option value="Investments">Investments</option>
              <option value="Food & Dining">Food & Dining</option>
              <option value="Groceries">Groceries</option>
              <option value="Rent/Housing">Rent/Housing</option>
              <option value="Utilities">Utilities</option>
              <option value="Transportation">Transportation</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Shopping">Shopping</option>
              <option value="Health/Medical">Health/Medical</option>
              <option value="Education">Education</option>
              <option value="Travel">Travel</option>
              <option value="Miscellaneous">Miscellaneous</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-account">Account</label>
            <select id="filter-account" class="form-control">
              <option value="">All Accounts</option>
              <option value="Cash">Cash</option>
              <option value="Bank">Bank</option>
              <option value="Credit Card">Credit Card</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-start">Start Date</label>
            <input type="date" id="filter-start" class="form-control">
          </div>

          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-end">End Date</label>
            <input type="date" id="filter-end" class="form-control">
          </div>

          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-search">Search Text</label>
            <input type="text" id="filter-search" class="form-control" placeholder="Search description...">
          </div>

          <button type="submit" class="btn btn-secondary" style="padding:12px;">
            <i class="fa-solid fa-filter"></i> Apply Filters
          </button>
        </form>
      </div>

      <!-- Ledger Transactions Table Card -->
      <div class="glass-card" style="overflow-x:auto;">
        <h3>Ledger Register</h3>
        <table style="width:100%; border-collapse:collapse; margin-top:20px; text-align:left; font-size:14px;">
          <thead>
            <tr style="border-bottom: 2px solid var(--border-color); color:var(--text-muted); font-weight:600;">
              <th style="padding: 12px 8px;">Date</th>
              <th style="padding: 12px 8px;">Title/Merchant</th>
              <th style="padding: 12px 8px;">Type</th>
              <th style="padding: 12px 8px;">Category</th>
              <th style="padding: 12px 8px;">Account</th>
              <th style="padding: 12px 8px; text-align:right;">Amount</th>
              <th style="padding: 12px 8px;">Notes</th>
              <th style="padding: 12px 8px; text-align:center;">Action</th>
            </tr>
          </thead>
          <tbody id="reports-ledger-body">
            <!-- Dynamic transactions loaded here -->
            <tr>
              <td colspan="8" style="text-align:center; padding:30px; color:var(--text-muted);">Loading ledger logs...</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
