<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register an account with Smart Expense Tracker.">
  <title>Sign Up - Smart Expense Tracker</title>
  
  <!-- FontAwesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card glass-card">
    <div class="auth-header">
      <i class="fa-solid fa-vault"></i>
      <h2>Create Account</h2>
      <p>Start your intelligent financial tracking today</p>
    </div>

    <form id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 10px;">
        <i class="fa-solid fa-user-plus"></i> Register
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
